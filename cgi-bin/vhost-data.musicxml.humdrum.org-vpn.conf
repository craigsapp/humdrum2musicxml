## 
## vim: ts=3:nowrap
##
## This configuration allows for both HTTPS and HTTP
## The HTTP connection is needed for the command-line
## Humdrum Extras tools.
##

# /etc/httpd/conf.d/musicxml.humdrum.org.conf

<VirtualHost *:80>
    ServerName musicxml.humdrum.org

    DocumentRoot /project/websites/musicxml.humdrum.org

    ScriptAlias /cgi-bin/ /var/www/cgi-bin/

    <Directory /var/www/cgi-bin>
        Options +ExecCGI
        AddHandler cgi-script .cgi .pl
        Require all granted
    </Directory>

    <Directory /project/websites/musicxml.humdrum.org>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Header always set Access-Control-Allow-Origin "https://verovio.humdrum.org"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization"
    Header always set Access-Control-Max-Age "86400"

    RewriteEngine On

    # Handle CORS preflight directly
    RewriteCond %{REQUEST_METHOD} =OPTIONS
    RewriteRule ^ - [R=204,L]

    # Internally send / to the CGI without a redirect
    RewriteRule ^/$ /cgi-bin/humdrum2musicxml [PT,L]

    ErrorLog /var/log/httpd/musicxml.humdrum.org-error.log
    CustomLog /var/log/httpd/musicxml.humdrum.org-access.log combined
</VirtualHost>
