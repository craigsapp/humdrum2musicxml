## 
## vim: ts=3:nowrap
##
## This configuration allows for both HTTPS and HTTP
## The HTTP connection is needed for the command-line
## Humdrum Extras tools.
##

<VirtualHost *:80>
    ServerName musicxml.humdrum.org
    DocumentRoot /project/websites/musicxml.humdrum.org

    ErrorLog /var/log/httpd/musicxml.humdrum.org-error.log

    Header always set Access-Control-Allow-Origin "*"

    RedirectMatch 302 ^/$ https://musicxml.humdrum.org/cgi-bin/humdrum2musicxml

    ScriptAlias /cgi-bin/ /var/www/cgi-bin/

    <Directory /project/websites/musicxml.humdrum.org>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/cgi-bin>
        AllowOverride None
        Options +ExecCGI
        Require all granted
    </Directory>
</VirtualHost>

